configuration:
  intercom_ip:
    name: "IP Local del Videoportero"
    description: "La dirección IP de tu dispositivo RTSP en tu red local (ejemplo: 192.168.1.150)."
  webrtc_port:
    name: "Puerto WebRTC"
    description: "El puerto para el tráfico de vídeo WebRTC. Por defecto: 8565."
  device_name:
    name: "Nombre del Dispositivo"
    description: "Identificador único para tu streaming de vídeo (ejemplo: videoportero)."
  go2rtc_api_port:
    name: "Puerto API go2rtc"
    description: "Puerto para la API interna del motor go2rtc. Por defecto: 1985."