configuration:
  intercom_ip:
    name: "1. IP Local del Videoportero"
    description: "La dirección IP de tu ESP32-P4 en tu red local (ejemplo: 192.168.1.150)."
  puerto_webrtc:
    name: "2. Puerto WebRTC (Avanzado)"
    description: "El puerto para el tráfico de vídeo. Por defecto es 8565 para evitar choques con Add-ons como Frigate."
  modo_operacion:
    name: "3. Modo de Operación"
    description: "Elige 'DuckDNS Auto' para una configuración sin esfuerzo, o 'Certificados Locales' si ya tienes tu propio proxy inverso configurado."
  duckdns_dominio:
    name: "4. Tu Dominio DuckDNS (Solo para modo Auto)"
    description: >-
      Ve a duckdns.org, crea un subdominio y pégalo aquí completo (ejemplo: micampo.duckdns.org).
  duckdns_token:
    name: "5. Tu Token DuckDNS (Solo para modo Auto)"
    description: >-
      Copia el 'Token' de seguridad que aparece arriba en la web de DuckDNS y pégalo aquí.
  ruta_certificado:
    name: "Ruta del Certificado Local (Solo usuarios avanzados)"
    description: "Ruta a tu fullchain.pem si usas Certificados Locales (ejemplo: /ssl/fullchain.pem)."
  ruta_clave:
    name: "Ruta de la Clave Privada (Solo usuarios avanzados)"
    description: "Ruta a tu privkey.pem si usas Certificados Locales (ejemplo: /ssl/privkey.pem)."