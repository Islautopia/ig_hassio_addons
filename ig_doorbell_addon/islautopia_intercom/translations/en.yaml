configuration:
  intercom_ip:
    name: "Local Intercom IP"
    description: "The IP address of your RTSP device on your local network (e.g., 192.168.1.150)."
  webrtc_port:
    name: "WebRTC Port"
    description: "The port for WebRTC video traffic. Default: 8565."
  device_name:
    name: "Device Name"
    description: "Unique identifier for your video stream (e.g., videoportero)."
  go2rtc_api_port:
    name: "go2rtc API Port"
    description: "Port for the internal go2rtc API. Default: 1985."